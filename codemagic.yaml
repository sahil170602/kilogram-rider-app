workflows:
  android-rider-workflow:
    name: Kilogram Rider - Signed APK Build

    max_build_duration: 60

    environment:
      node: 20
      java: 17   # ⚠️ safer than 21 for Android builds
      groups:
        - supabase_creds
      android_signing:
        - kilogram user

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app (CRITICAL)
        script: |
          npm run build

      - name: Ensure Capacitor uses dist
        script: |
          npx cap sync android

      - name: Generate app icons (optional)
        script: |
          npx @capacitor/assets generate --android

      - name: Clean previous builds
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean

      - name: Build Signed APK
        script: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - sahilmeshram1917@gmail.com